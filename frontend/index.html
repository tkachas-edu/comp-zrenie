<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Умный фоторедактор</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Умный фоторедактор</h1>
  <p class="subtitle">Базовые фильтры на клиенте · Компьютерное зрение на сервере</p>
</header>

<main>

  <!-- ── Upload zone ─────────────────────────────────────────────────────── -->
  <section class="upload-section">
    <div id="dropzone" class="dropzone">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 12v28M20 24l12-12 12 12" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 44h40v4a4 4 0 01-4 4H16a4 4 0 01-4-4v-4z" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>Перетащите изображение сюда<br/>или <label for="fileInput" class="file-label">выберите файл</label></p>
      <input type="file" id="fileInput" accept="image/*" hidden />
    </div>
  </section>

  <!-- ── Canvas area ─────────────────────────────────────────────────────── -->
  <section class="canvas-section" id="canvasSection" hidden>

    <div class="canvases">
      <div class="canvas-wrap">
        <span class="canvas-label">Оригинал</span>
        <canvas id="originalCanvas"></canvas>
      </div>
      <div class="canvas-wrap result-wrap">
        <span class="canvas-label">Результат</span>
        <canvas id="resultCanvas"></canvas>
        <div id="spinner" class="spinner" hidden>
          <div class="spinner-ring"></div>
          <span>Обработка…</span>
        </div>
      </div>
    </div>

    <!-- ── Control panel ──────────────────────────────────────────────────── -->
    <div class="controls">

      <div class="filter-group">
        <h3>Базовые фильтры <span class="badge client">на клиенте</span></h3>
        <div class="btn-row">
          <button class="btn btn-basic" data-filter="grayscale">Оттенки серого</button>
          <button class="btn btn-basic" data-filter="invert">Инверсия</button>
          <button class="btn btn-basic" data-filter="blur">Размытие</button>
        </div>
      </div>

      <div class="filter-group">
        <h3>Умные операции <span class="badge server">на сервере</span></h3>
        <div class="btn-row">
          <button class="btn btn-smart" data-op="detect_faces">
            <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/><circle cx="7" cy="9" r="1" fill="currentColor"/><circle cx="13" cy="9" r="1" fill="currentColor"/><path d="M7 13s1 2 3 2 3-2 3-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Найти лица
          </button>
          <button class="btn btn-smart" data-op="remove_bg">
            <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/><path d="M7 13l3-4 3 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Удалить фон
          </button>
          <button class="btn btn-smart" data-op="find_edges">
            <svg viewBox="0 0 20 20" fill="none"><path d="M4 16L9 9l3 4 2-3 3 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Контуры
          </button>
        </div>
      </div>

      <div class="action-row">
        <button class="btn btn-reset" id="resetBtn">Сброс</button>
        <button class="btn btn-download" id="downloadBtn" disabled>Скачать результат</button>
      </div>

    </div>
    <!-- /controls -->

  </section>
  <!-- /canvas-section -->

</main>

<!-- OpenCV.js (CDN) -->
<script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
<script src="app.js"></script>
</body>
</html>
